<div class="tasks-list">
  <div class="wrapper">
    <div class="user">
      <app-user-detail [username]="username()"/>
    </div>
    <div class="projects">
      <div class="header">
        <app-tasks-filter (onChangeFilters)="changeFilters($event)"/>
      </div>
      <div class="body">
        @for (task of tasks()?.tasks; track task.id) {
          <app-task-card [task]="task"/>
        }
      </div>
    </div>
  </div>
</div>
